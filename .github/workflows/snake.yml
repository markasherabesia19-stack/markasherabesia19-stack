name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"  # Runs every 12 hours
  workflow_dispatch:         # Allows manual trigger
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: markasherabesia19-stack
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=00B4FF&color_dots=#1a1f2e,#003f5c,#0077b6,#00B4FF,#90e0ef
            dist/github-contribution-grid-snake-dark.svg?color_snake=00B4FF&color_dots=#1a1f2e,#003f5c,#0077b6,#00B4FF,#90e0ef

      - name: Push snake.svg to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
